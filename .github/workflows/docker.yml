name: container

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t amdhack:ci .

      - name: Smoke-run container
        run: |
          docker run -d --name smoke -p 8000:8000 -e FIREWORKS_API_KEY=dummy amdhack:ci
          sleep 5
          curl -sf http://localhost:8000/health
          docker rm -f smoke

      - name: Push to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker tag amdhack:ci $IMAGE
          docker push $IMAGE
